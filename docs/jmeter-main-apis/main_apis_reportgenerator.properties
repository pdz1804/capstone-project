# JMeter HTML dashboard settings for main APIs focused tests.
# Ref: JMeter User Manual 14.x report dashboard generation.

jmeter.reportgenerator.report_title=BK-MInD Main APIs Focus Dashboard
jmeter.reportgenerator.overall_granularity=60000
jmeter.reportgenerator.graph.responseTimeDistribution.property.set_granularity=100

# APDEX thresholds (ms)
jmeter.reportgenerator.apdex_satisfied_threshold=1500
jmeter.reportgenerator.apdex_tolerated_threshold=3000

# Summary and percentile graph percentiles
jmeter.reportgenerator.aggregate_rpt_pct1=90
jmeter.reportgenerator.aggregate_rpt_pct2=95
jmeter.reportgenerator.aggregate_rpt_pct3=99

# Keep percentile estimator aligned with Aggregate Report behavior.
backend_metrics_percentile_estimator=R_3

# Focus report series on high-risk/core APIs only.
jmeter.reportgenerator.exporter.html.series_filter=^(GET /api/users/me|POST /api/search \(retrieval_generation text\)|POST /api/search \(retrieval_generation both\)|POST /api/upload \(core\)|POST /api/process \(core\)|POST /api/index \(core\)|GET /api/processing-stats \(core\))(-success|-failure)?$
jmeter.reportgenerator.exporter.html.filters_only_sample_series=true
jmeter.reportgenerator.exporter.html.show_controllers_only=false
