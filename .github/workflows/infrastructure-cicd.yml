name: Infrastructure CI/CD (Terraform)

on:
  push:
    branches:
      - main
    paths:
      - 'Phase_2/terraform/**'
      - '.github/workflows/infrastructure-cicd.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'Phase_2/terraform/**'

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.6.0
  TF_VAR_aws_region: us-east-1
  TF_VAR_environment: production
  TF_VAR_project_name: rag-pipeline

jobs:
  # ==================== Terraform Plan ====================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log Step 1 - Checkout
        run: |
          echo "========================================"
          echo "STEP 1: CODE CHECKOUT"
          echo "========================================"
          echo "Branch: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Terraform files:"
          ls -la Phase_2/terraform/

      # Step 2: Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Log Step 2 - Terraform Setup
        run: |
          echo "========================================"
          echo "STEP 2: TERRAFORM SETUP"
          echo "========================================"
          terraform --version
          terraform fmt -check Phase_2/terraform/ || echo "Some files need formatting"

      # Step 3: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log Step 3 - AWS Credentials
        run: |
          echo "========================================"
          echo "STEP 3: AWS CREDENTIALS"
          echo "========================================"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Account: $(aws sts get-caller-identity --query Account --output text)"
          echo "User/Role: $(aws sts get-caller-identity --query Arn --output text)"

      # Step 4: Terraform init
      - name: Terraform init
        working-directory: Phase_2/terraform
        run: |
          echo "========================================"
          echo "STEP 4: TERRAFORM INIT"
          echo "========================================"
          terraform init -upgrade -no-color

      - name: Log Step 4 - Init Complete
        run: |
          echo "Terraform initialized successfully"
          echo "Backend configuration:"
          cat Phase_2/terraform/.terraform/terraform.tfstate 2>/dev/null | jq '.version' || echo "Using backend: s3"

      # Step 5: Terraform validate
      - name: Terraform validate
        working-directory: Phase_2/terraform
        run: |
          echo "========================================"
          echo "STEP 5: TERRAFORM VALIDATE"
          echo "========================================"
          terraform validate

      # Step 6: Terraform plan
      - name: Terraform plan
        id: plan
        working-directory: Phase_2/terraform
        run: |
          echo "========================================"
          echo "STEP 6: TERRAFORM PLAN"
          echo "========================================"
          terraform plan -no-color -out=tfplan
          echo "plan_status=success" >> $GITHUB_OUTPUT

      - name: Log Step 6 - Plan Details
        if: always()
        working-directory: Phase_2/terraform
        run: |
          echo "========================================"
          echo "TERRAFORM PLAN SUMMARY"
          echo "========================================"
          terraform show -no-color tfplan | head -100
          echo ""
          echo "Plan saved to: tfplan"

      # Step 7: Save plan to artifact
      - name: Save plan artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: tfplan-${{ github.run_number }}
          path: Phase_2/terraform/tfplan
          retention-days: 7

      - name: Log Step 7 - Artifact
        run: |
          echo "========================================"
          echo "TERRAFORM PLAN ARTIFACT"
          echo "========================================"
          echo "Artifact Name: tfplan-${{ github.run_number }}"
          echo "Location: Phase_2/terraform/tfplan"

      # Step 8: Comment on PR (if PR)
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan
                
              **Status:** Plan generated successfully
              
              **Steps Completed:**
              - Terraform initialized
              - Configuration validated
              - Infrastructure plan generated
              
              **Next Steps:**
              - Push to main branch to apply changes
              - Monitor deployment in GitHub Actions
              - Check CloudWatch logs for any issues
              
              **Plan Details:**
              \`\`\`
              Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              \`\`\``
            })

  # ==================== Terraform Apply ====================
  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log Step 1 - Checkout for Apply
        run: |
          echo "========================================"
          echo "TERRAFORM APPLY - STEP 1"
          echo "========================================"
          echo "Target: main branch"
          echo "Action: Apply infrastructure changes"

      # Step 2: Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # Step 3: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log Step 3 - AWS Setup
        run: |
          echo "========================================"
          echo "TERRAFORM APPLY - STEP 3"
          echo "========================================"
          echo "AWS Account: $(aws sts get-caller-identity --query Account --output text)"

      # Step 4: Download plan artifact
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_number }}
          path: Phase_2/terraform/

      - name: Log Step 4 - Plan Downloaded
        run: |
          echo "========================================"
          echo "TERRAFORM APPLY - STEP 4"
          echo "========================================"
          ls -la Phase_2/terraform/tfplan

      # Step 5: Terraform init
      - name: Terraform init
        working-directory: Phase_2/terraform
        run: terraform init -no-color

      # Step 6: Terraform apply
      - name: Terraform apply
        id: apply
        working-directory: Phase_2/terraform
        run: |
          echo "========================================"
          echo "TERRAFORM APPLY - STEP 6"
          echo "========================================"
          echo "Applying infrastructure changes..."
          terraform apply -no-color -auto-approve tfplan

          echo "==== APPLY COMPLETE ===="
          terraform show -no-color | tail -50

      - name: Log Step 6 - Apply Output
        if: always()
        working-directory: Phase_2/terraform
        run: |
          echo "========================================"
          echo "TERRAFORM APPLY OUTPUT"
          echo "========================================"
          terraform output -no-color

      # Step 7: Verify infrastructure
      - name: Verify infrastructure
        run: |
          echo "========================================"
          echo "STEP 7: INFRASTRUCTURE VERIFICATION"
          echo "========================================"
          
          # Check ECS cluster
          echo "ECS Cluster Status:"
          aws ecs describe-clusters \
            --clusters rag-pipeline-cluster \
            --region ${{ env.AWS_REGION }} \
            --query 'clusters[0].{name: clusterName, status: status, activeServicesCount: activeServicesCount}' || echo "Cluster not yet available"
          
          echo ""
          
          # Check ECR repositories
          echo "ECR Repositories:"
          aws ecr describe-repositories \
            --region ${{ env.AWS_REGION }} \
            --query 'repositories[?contains(repositoryName, `rag-pipeline`)].{name: repositoryName, uri: repositoryUri, createdAt: createdAt}' || echo "Repositories not yet available"
          
          echo ""
          
          # Check ALB
          echo "Load Balancer Status:"
          aws elbv2 describe-load-balancers \
            --region ${{ env.AWS_REGION }} \
            --query 'LoadBalancers[?contains(LoadBalancerName, `rag-pipeline`)].{name: LoadBalancerName, dns: DNSName, status: State.Code}' || echo "ALB not yet available"

      # Step 8: Save infrastructure output
      - name: Save infrastructure output
        working-directory: Phase_2/terraform
        run: |
          echo "========================================"
          echo "STEP 8: SAVE INFRASTRUCTURE OUTPUT"
          echo "========================================"
          terraform output -json > /tmp/infrastructure-output.json
          cat /tmp/infrastructure-output.json | jq '.'

      - name: Upload infrastructure output
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-output-${{ github.run_number }}
          path: /tmp/infrastructure-output.json
          retention-days: 30

  # ==================== Notification ====================
  notify:
    name: Notify Results
    needs: [terraform-plan, terraform-apply]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send notification
        run: |
          echo "========================================"
          echo "TERRAFORM WORKFLOW SUMMARY"
          echo "========================================"
          echo "Plan Status: ${{ needs.terraform-plan.result }}"
          echo "Apply Status: ${{ needs.terraform-apply.result }}"
          echo "Workflow URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          if [ "${{ needs.terraform-apply.result }}" != "success" ]; then
            echo "Infrastructure deployment failed or was skipped."
          else
            echo "Infrastructure deployment completed successfully!"
          fi
